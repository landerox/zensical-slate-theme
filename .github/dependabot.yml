# =============================================================================
# Dependabot - Automated dependency updates
# =============================================================================
version: 2
updates:
  # ---------------------------------------------------------------------------
  # GitHub Actions (.github/workflows/*.yml)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------------
  # Python (pyproject.toml: zensical + dev tools)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
      semver-major-days: 14
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "build"
      prefix-development: "chore"
      include: "scope"
    groups:
      python-prod:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      python-dev:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
