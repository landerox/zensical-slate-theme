name: Quality · Lighthouse
run-name: >-
  Lighthouse · ${{
    github.event_name == 'pull_request' && github.event.pull_request.title
    || github.event_name == 'push' && github.event.head_commit.message
    || github.event_name == 'workflow_dispatch' && 'manual dispatch'
    || github.ref_name
  }}

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "zensical_slate_theme/**"
      - "zensical.toml"
      - "zensical.es.toml"
      - ".github/workflows/quality.yml"
      - ".config/lighthouserc.json"
  pull_request:
    branches:
      - main
    paths:
      - "content/**"
      - "zensical_slate_theme/**"
      - "zensical.toml"
      - "zensical.es.toml"
      - ".github/workflows/quality.yml"
      - ".config/lighthouserc.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.23"
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install Just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Install Python dependencies
        run: just sync

      - name: Build site (EN + ES)
        run: just build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        with:
          configPath: .config/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: false
