name: CI · DCO Check
run-name: >-
  DCO Check · ${{
    github.event_name == 'pull_request' && github.event.pull_request.title
    || github.event_name == 'workflow_dispatch' && 'manual dispatch'
    || github.ref_name
  }}

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run DCO verification
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manually triggered workflow. Checking last 5 commits on current HEAD."
            commits=$(git log -5 --format="%H")
          else
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            echo "Checking commits in range: $BASE_SHA..$HEAD_SHA"
            commits=$(git log --format="%H" "$BASE_SHA..$HEAD_SHA")
          fi

          if [ -z "$commits" ]; then
            echo "No commits found in the PR range."
            exit 0
          fi

          failed=0
          for commit in $commits; do
            subject=$(git log -1 --format="%s" "$commit")
            author_name=$(git log -1 --format="%an" "$commit")
            author_email=$(git log -1 --format="%ae" "$commit")

            echo "Checking commit $commit: $subject"

            # Check if commit message contains "Signed-off-by: "
            if ! git log -1 --format="%B" "$commit" | grep -qFi "Signed-off-by:"; then
              echo "::error file=.github/workflows/dco.yml::Commit $commit is missing 'Signed-off-by:' signature!"
              echo "  Subject: $subject"
              echo "  Author:  $author_name <$author_email>"
              echo "  Expected: Signed-off-by: $author_name <$author_email>"
              failed=1
            else
              sig_line=$(git log -1 --format="%B" "$commit" | grep -Fi "Signed-off-by:" | tail -n1)
              echo "  Found signature: $sig_line"
            fi
          done

          if [ "$failed" -eq 1 ]; then
            echo "::error::One or more commits in this PR are missing DCO sign-off. Please sign-off your commits with 'git commit -s'."
            exit 1
          fi

          echo "All commits have a valid DCO signature!"
