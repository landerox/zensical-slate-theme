name: Maintenance · uv lock upgrade
run-name: >-
  uv lock upgrade · ${{
    github.event_name == 'schedule' && 'weekly'
    || github.event_name == 'workflow_dispatch' && 'manual dispatch'
    || github.ref_name
  }}

on:
  schedule:
    # Tuesdays 06:00 UTC — away from Monday's CI congestion
    # (Dependabot 06:00, Lychee 07:00).
    - cron: "0 6 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upgrade:
    name: Refresh lockfile and open PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.23"
          enable-cache: true

      - name: Refresh lockfile
        run: uv lock --upgrade

      - name: Open pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore(deps): weekly uv lock upgrade

            Signed-off-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          branch: chore/weekly-uv-upgrade
          delete-branch: true
          title: "chore(deps): weekly uv lock upgrade"
          sign-commits: true
          body: |
            Automated weekly refresh of `uv.lock` via `uv lock --upgrade`.

            Complements `.github/dependabot.yml` (which only updates
            declared deps in `pyproject.toml`) by refreshing transitive
            deps that live only in the lockfile.
          labels: |
            dependencies
            python
