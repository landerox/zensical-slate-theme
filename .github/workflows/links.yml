name: Maintenance · Link check
run-name: >-
  Link check · ${{
    github.event_name == 'schedule' && 'weekly'
    || github.event_name == 'workflow_dispatch' && 'manual dispatch'
    || github.ref_name
  }}

on:
  schedule:
    # Mondays 07:00 UTC (1h after Dependabot, same time zone).
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    name: Check outbound links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: cache-lychee

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Sync bilingual assets
        run: just sync-assets

      - name: Run Lychee link checker
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          lycheeVersion: v0.24.2
          args: >-
            --config .config/lychee.toml
            --root-dir .
            --cache
            --max-cache-age 7d
            'content/**/*.md'
          fail: true

      - name: Create issue from report
        if: failure()
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: Broken links detected by Lychee
          content-filepath: ./lychee/out.md
          labels: |
            broken-links
            automated
