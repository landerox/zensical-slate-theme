name: CI · Quality & Build
run-name: >-
  CI · ${{
    github.event_name == 'pull_request' && github.event.pull_request.title
    || github.event_name == 'push' && github.event.head_commit.message
    || github.event_name == 'workflow_dispatch' && 'manual dispatch'
    || github.ref_name
  }}

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "zensical_slate_theme/**"
      - "zensical.toml"
      - "zensical.es.toml"
      - "pyproject.toml"
      - "uv.lock"
      - ".pre-commit-config.yaml"
      - ".config/**"
      - "eslint.config.js"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "content/**"
      - "zensical_slate_theme/**"
      - "zensical.toml"
      - "zensical.es.toml"
      - "pyproject.toml"
      - "uv.lock"
      - ".pre-commit-config.yaml"
      - ".config/**"
      - "eslint.config.js"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run pre-commit quality linters
        run: uv run pre-commit run --all-files

      - name: Audit Python dependencies
        run: just audit

      - name: Test Build Site
        run: just build
